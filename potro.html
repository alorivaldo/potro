<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">

    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

            <img class="ikamba" src="assets/IKAMBA Logo - Original - 5000x5000 (1).png" alt="logo da ikamba">

            <ul>
                <li class="hideMobile"><a href="#">Home</a></li>

                <li class="hideMobile"></li><a href="#">Clients</a></li>

            </ul>
            
            <ul class="sidebar">
                <li onclick="hideSidebar()"><a href="#"><img class="icon" src="assets/close.svg.svg" alt="menu"></a></li>
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Clients</a></li>
                <li><a href="#">contacts</a></li>

</html>
